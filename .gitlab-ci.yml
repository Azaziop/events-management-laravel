stages:
  - build
  - test
  - release
  - deploy

variables:
  DOCKERHUB_REPOSITORY: "event-management"
  COMPOSER_ALLOW_SUPERUSER: "1"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - vendor/
    - node_modules/

verify_dind:
  stage: build
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker version
    - docker info
    - docker run --rm hello-world

build_assets:
  stage: build
  image: node:20-alpine
  script:
    - npm ci
    - npm run build
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - public/build/

build_image_check:
  stage: build
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker version
    - docker build --pull -t "$CI_PROJECT_NAME:$CI_COMMIT_SHORT_SHA" .

build_backend:
  stage: build
  image: php:8.2-cli
  before_script:
    - find app bootstrap config database public resources routes tests -type f \( -name "* 2.*" -o -name "* 3.*" \) -delete
    - apt-get update
    - apt-get install -y git unzip libzip-dev libsqlite3-dev
    - docker-php-ext-install pdo pdo_sqlite zip
    - php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
    - php composer-setup.php --install-dir=/usr/local/bin --filename=composer
    - rm composer-setup.php
  script:
    - composer install --prefer-dist --no-interaction --no-progress
    - php artisan --version

test_laravel:
  stage: test
  image: php:8.2-cli
  services:
    - name: postgres:16-alpine
      alias: db
  variables:
    POSTGRES_DB: events_db
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: "123"
    DB_CONNECTION: pgsql
    DB_HOST: db
    DB_PORT: 5432
    DB_DATABASE: events_db
    DB_USERNAME: postgres
    DB_PASSWORD: "123"
    PGPASSWORD: "123"
  before_script:
    - find app bootstrap config database public resources routes tests -type f \( -name "* 2.*" -o -name "* 3.*" \) -delete
    - apt-get update
    - apt-get install -y git unzip libpq-dev postgresql-client
    - docker-php-ext-install pdo pdo_pgsql
    - php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
    - php composer-setup.php --install-dir=/usr/local/bin --filename=composer
    - rm composer-setup.php
  script:
    - cp .env.example .env
    - composer install --prefer-dist --no-interaction --no-progress
    - php artisan key:generate
    - until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USERNAME"; do echo "Waiting for PostgreSQL..."; sleep 2; done
    - php artisan migrate --force
    - php artisan test

release_image:
  stage: release
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  needs:
    - test_laravel
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - test -n "$DOCKERHUB_USERNAME"
    - test -n "$DOCKERHUB_TOKEN"
    - export DOCKERHUB_USERNAME_RAW="$(if [ -f \"$DOCKERHUB_USERNAME\" ]; then cat \"$DOCKERHUB_USERNAME\"; else printf '%s' \"$DOCKERHUB_USERNAME\"; fi)"
    - export DOCKERHUB_TOKEN_RAW="$(if [ -f \"$DOCKERHUB_TOKEN\" ]; then cat \"$DOCKERHUB_TOKEN\"; else printf '%s' \"$DOCKERHUB_TOKEN\"; fi)"
    - export DOCKERHUB_USERNAME_CLEAN="$(printf '%s' \"$DOCKERHUB_USERNAME_RAW\" | tr -d '\r\n\t ' )"
    - export DOCKERHUB_TOKEN_CLEAN="$(printf '%s' \"$DOCKERHUB_TOKEN_RAW\" | tr -d '\r\n\t ' )"
    - export DOCKERHUB_USERNAME_CLEAN="${DOCKERHUB_USERNAME_CLEAN#\"}" && export DOCKERHUB_USERNAME_CLEAN="${DOCKERHUB_USERNAME_CLEAN%\"}"
    - export DOCKERHUB_TOKEN_CLEAN="${DOCKERHUB_TOKEN_CLEAN#\"}" && export DOCKERHUB_TOKEN_CLEAN="${DOCKERHUB_TOKEN_CLEAN%\"}"
    - test -n "$DOCKERHUB_USERNAME_CLEAN"
    - test -n "$DOCKERHUB_TOKEN_CLEAN"
    - printf 'DockerHub username length=%s token length=%s\n' "${#DOCKERHUB_USERNAME_CLEAN}" "${#DOCKERHUB_TOKEN_CLEAN}"
    - export IMAGE_NAME="$DOCKERHUB_USERNAME_CLEAN/$DOCKERHUB_REPOSITORY"
    - printf '%s' "$DOCKERHUB_TOKEN_CLEAN" | docker login -u "$DOCKERHUB_USERNAME_CLEAN" --password-stdin
    - docker build -t "$IMAGE_NAME:$CI_COMMIT_TAG" .
    - docker push "$IMAGE_NAME:$CI_COMMIT_TAG"

deploy_latest:
  stage: deploy
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  needs:
    - test_laravel
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - test -n "$DOCKERHUB_USERNAME"
    - test -n "$DOCKERHUB_TOKEN"
    - export DOCKERHUB_USERNAME_RAW="$(if [ -f \"$DOCKERHUB_USERNAME\" ]; then cat \"$DOCKERHUB_USERNAME\"; else printf '%s' \"$DOCKERHUB_USERNAME\"; fi)"
    - export DOCKERHUB_TOKEN_RAW="$(if [ -f \"$DOCKERHUB_TOKEN\" ]; then cat \"$DOCKERHUB_TOKEN\"; else printf '%s' \"$DOCKERHUB_TOKEN\"; fi)"
    - export DOCKERHUB_USERNAME_CLEAN="$(printf '%s' \"$DOCKERHUB_USERNAME_RAW\" | tr -d '\r\n\t ' )"
    - export DOCKERHUB_TOKEN_CLEAN="$(printf '%s' \"$DOCKERHUB_TOKEN_RAW\" | tr -d '\r\n\t ' )"
    - export DOCKERHUB_USERNAME_CLEAN="${DOCKERHUB_USERNAME_CLEAN#\"}" && export DOCKERHUB_USERNAME_CLEAN="${DOCKERHUB_USERNAME_CLEAN%\"}"
    - export DOCKERHUB_TOKEN_CLEAN="${DOCKERHUB_TOKEN_CLEAN#\"}" && export DOCKERHUB_TOKEN_CLEAN="${DOCKERHUB_TOKEN_CLEAN%\"}"
    - test -n "$DOCKERHUB_USERNAME_CLEAN"
    - test -n "$DOCKERHUB_TOKEN_CLEAN"
    - printf 'DockerHub username length=%s token length=%s\n' "${#DOCKERHUB_USERNAME_CLEAN}" "${#DOCKERHUB_TOKEN_CLEAN}"
    - export IMAGE_NAME="$DOCKERHUB_USERNAME_CLEAN/$DOCKERHUB_REPOSITORY"
    - printf '%s' "$DOCKERHUB_TOKEN_CLEAN" | docker login -u "$DOCKERHUB_USERNAME_CLEAN" --password-stdin
    - docker build -t "$IMAGE_NAME:latest" -t "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" .
    - docker push "$IMAGE_NAME:latest"
    - docker push "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"

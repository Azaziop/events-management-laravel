# kube-prometheus-stack — monitoring K8s (Prometheus + Grafana + Alertmanager)
# Chart : prometheus-community/kube-prometheus-stack

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

prometheus:
  prometheusSpec:
    retention: 6h
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

grafana:
  enabled: true
  adminPassword: admin
  defaultDashboardsEnabled: true
  service:
    type: NodePort
    nodePort: 30300
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki:3100
      isDefault: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

# Réduire l'empreinte sur kind (1 nœud)
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false
coreDns:
  enabled: true
kubeStateMetrics:
  enabled: true
nodeExporter:
  enabled: true

defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false
    kubeControllerManager: false
    kubeScheduler: false
    kubeProxy: false

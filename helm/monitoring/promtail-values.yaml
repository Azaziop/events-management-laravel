# Promtail — collecte des logs des pods vers Loki
config:
  clients:
    - url: http://loki:3100/loki/api/v1/push
  snippets:
    pipelineStages:
      - cri: {}
    extraRelabelConfigs:
      - action: replace
        source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - action: replace
        source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - action: replace
        source_labels: [__meta_kubernetes_container_name]
        target_label: container

resources:
  requests:
    cpu: 50m
    memory: 64Mi

tolerations:
  - effect: NoSchedule
    operator: Exists

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "events-management.fullname" . }}
  labels:
    {{- include "events-management.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "events-management.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        {{- include "events-management.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: app
    spec:
      volumes:
        - name: public-assets
          emptyDir: {}
        - name: storage-data
          {{- if .Values.persistence.storage.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "events-management.fullname" . }}-storage
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: nginx-config
          configMap:
            name: {{ include "events-management.fullname" . }}-nginx
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /shared/public
              cp -a /var/www/html/public/. /shared/public/
              mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache/data storage/logs bootstrap/cache
              chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true
              chmod -R 777 storage bootstrap/cache
              su -s /bin/sh www-data -c 'php artisan config:clear && php artisan migrate --force'
              mkdir -p storage/app/public/events
              ln -sfn /var/www/html/storage/app/public /shared/public/storage
              touch /shared/public/.ready
              exec php-fpm
          env:
            - name: APP_ENV
              value: {{ .Values.app.env | quote }}
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "events-management.fullname" . }}
                  key: APP_KEY
            - name: APP_URL
              value: {{ .Values.app.url | quote }}
            - name: DB_CONNECTION
              value: pgsql
            - name: DB_HOST
              value: {{ include "events-management.dbHost" . | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | quote }}
            - name: DB_DATABASE
              value: {{ .Values.database.name | quote }}
            - name: DB_USERNAME
              value: {{ .Values.database.user | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "events-management.fullname" . }}
                  key: DB_PASSWORD
            - name: SESSION_DRIVER
              value: database
            - name: CACHE_STORE
              value: database
            - name: QUEUE_CONNECTION
              value: sync
            - name: LOG_CHANNEL
              value: stderr
          volumeMounts:
            - name: public-assets
              mountPath: /shared/public
            - name: storage-data
              mountPath: /var/www/html/storage
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - test -f /shared/public/.ready
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 24
          resources:
            {{- toYaml .Values.resources.app | nindent 12 }}

        - name: nginx
          image: {{ .Values.nginx.image }}
          imagePullPolicy: {{ .Values.nginx.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          command:
            - sh
            - -c
            - |
              cp /etc/nginx/conf.d-source/default.conf /etc/nginx/conf.d/default.conf
              for i in $(seq 1 60); do
                if [ -f /var/www/html/public/.ready ]; then
                  break
                fi
                sleep 2
              done
              exec nginx -g 'daemon off;'
          volumeMounts:
            - name: public-assets
              mountPath: /var/www/html/public
              readOnly: true
            - name: storage-data
              mountPath: /var/www/html/storage
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d-source
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10

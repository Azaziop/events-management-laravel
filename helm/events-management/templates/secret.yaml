apiVersion: v1
kind: Secret
metadata:
  name: {{ include "events-management.fullname" . }}
  labels:
    {{- include "events-management.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP_KEY: {{ required "app.key is required" .Values.app.key | quote }}
  DB_PASSWORD: {{ .Values.database.password | quote }}

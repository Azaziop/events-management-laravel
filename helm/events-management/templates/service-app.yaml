apiVersion: v1
kind: Service
metadata:
  name: {{ include "events-management.fullname" . }}
  labels:
    {{- include "events-management.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    {{- include "events-management.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app

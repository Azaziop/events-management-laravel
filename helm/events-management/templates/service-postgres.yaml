{{- if .Values.database.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "events-management.fullname" . }}-postgres
  labels:
    {{- include "events-management.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.database.port }}
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "events-management.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}

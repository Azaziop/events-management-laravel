# Production : utilise l'image poussée par Jenkins sur Docker Hub
# Usage : IMAGE_TAG=16-68b4bdb docker compose -f docker-compose.prod.yml up -d

services:
  backend:
    image: ${IMAGE_NAME:-azaziop/event-management1}:${IMAGE_TAG:-latest}
    restart: always
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-events_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: sync
    volumes:
      - storage_data:/var/www/html/storage
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - public_assets:/var/www/html/public:ro
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  public_assets:
  storage_data:

# public_assets : fichiers statiques de l'image (build Vite, index.php) — pas monté sur backend
